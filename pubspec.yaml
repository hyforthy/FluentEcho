name: FluentEcho
description: AI英语碎片化学习助理
version: 1.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.0

  # 本地数据库
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.23
  path_provider: ^2.1.3
  path: ^1.9.0

  # 序列化/不可变模型
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # 安全存储
  flutter_secure_storage: ^9.2.2

  # 网络
  dio: ^5.4.3+1
  dio_smart_retry: ^6.0.0

  # 加密（iFlytek HMAC-SHA256 / Amazon AWS Sig V4）
  crypto: ^3.0.3

  # 音频录制（v6 修复 record_linux 接口兼容性，Android/iOS 构建需要）
  record: ^6.2.0

  # 音频播放
  just_audio: ^0.10.0
  audio_session: ^0.2.0

  # TTS 离线降级
  flutter_tts: ^4.0.2

  # STT 降级（系统原生）
  speech_to_text: ^7.0.0

  # 权限
  permission_handler: ^11.3.1

  # 分享 & 文件选择
  share_plus: ^12.0.0
  file_picker: ^8.1.4

  # 应用信息
  package_info_plus: ^9.0.0

  # 工具
  uuid: ^4.4.0
  logger: ^2.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
